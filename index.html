<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Banner </title>

    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
            padding: 20px;
        }

        .box {
            max-width: 700px;
            margin: auto;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
        }

        textarea {
            width: 100%;
            height: 200px;
            padding: 10px;
            margin-top: 10px;
        }

        button {
            margin-top: 15px;
            padding: 10px 15px;
            background: black;
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="box">
        <h2>Banner Section </h2>

        <textarea id="input" placeholder="Paste full content here..."></textarea>

        <button onclick="generateHTML()">Get HTML</button>

        <h3>Output</h3>
        <textarea id="output" readonly></textarea>
    </div>
    <div class="box">
        <h2>Section 2 - Braces Cost </h2>

        <textarea id="input2" placeholder="Paste content like:
    
    How Much Do Braces Cost in Los Angeles? (H2)
    
    Paragraph here..."></textarea>

        <button onclick="generateSection2()">Get HTML</button>

        <h3>Output</h3>
        <textarea id="output2" readonly></textarea>
    </div>
    <div class="box">
        <h2>Section 3 </h2>

        <textarea id="input3" placeholder="Use format:

        H2: Heading

        P: Paragraph

        H3: Subheading

        LI: Item 1
        LI: Item 2

        P: Paragraph

        CTA: Button text"></textarea>

        <button onclick="generateSection3()">Get HTML</button>

        <h3>Output</h3>
        <textarea id="output3" readonly></textarea>
    </div>
    <script>
        function generateHTML() {
            let input = document.getElementById("input").value.trim();

            // Split by empty line
            let parts = input.split(/\n\s*\n/);

            let heading = parts[0] || "";
            let desc = parts[1] || "";
            let button = parts[2] || "";

            // Replace price with span
            desc = desc.replace(
                /\$\d+/g,
                '<span class="smileadvantage__single_price_text"></span>',
            );

            const html = `<h1>${heading} </h1>
        <p>
        ${desc}
        </p>
        <a href="https://alignerco.com/pages/survey" class="e-consultation-header-button city-button" style="font-weight: 600;">${button}
        </a>`;

            document.getElementById("output").value = html;
        }

    </script>
    <script>
        function generateSection2() {
            let input = document.getElementById("input2").value.trim();

            // Split by empty line
            let parts = input.split(/\n\s*\n/);

            // Clean heading (remove H2 if user writes it)
            let heading = (parts[0] || "").replace(/\(.*?\)/g, "").trim();
            let desc = parts[1] || "";

            const html = `<div class="braces-card">
      <h2>
          ${heading}
      </h2>
    
      <div class="braces-content" id="bracesContent">
          ${desc}
      </div>
    
      <button type="button" class="braces-read-more" id="bracesReadMore" aria-expanded="false">
          Read more
      </button>
    
      <a href="https://alignerco.com/pages/survey" class="braces-btn primary-button">Get Started with ALIGNERCO</a>
    </div>`;

            document.getElementById("output2").value = html;
        }
    </script>
    <script>
        function generateSection3() {
            let input = document.getElementById("input3").value.trim();

            let lines = input.split("\n");

            let h2 = "", p1 = "", h3 = "", p2 = "", cta = "";
            let listItems = [];

            lines.forEach(line => {
                line = line.trim();

                if (line.startsWith("H2:")) h2 = line.replace("H2:", "").trim();
                else if (line.startsWith("H3:")) h3 = line.replace("H3:", "").trim();
                else if (line.startsWith("P:") && !p1) p1 = line.replace("P:", "").trim();
                else if (line.startsWith("P:")) p2 = line.replace("P:", "").trim();
                else if (line.startsWith("LI:")) listItems.push(line.replace("LI:", "").trim());
                else if (line.startsWith("CTA:")) cta = line.replace("CTA:", "").trim();
            });

            let liHTML = listItems.map(item => `
            <li><span class="best-choice-city-check"><img
                src="https://cdn.shopify.com/s/files/1/0685/4115/3567/files/Group_1000005758_e9a2c843-8441-428e-a5ea-a77c09d3c0ec.png?v=1773406172"
                alt=""></span>${item}</li>`).join("");

            const html = `<div class="best-choice-city-wapper">
            <div class="best-choice-city-left">
                <h2>${h2}</h2>

                <p>${p1}</p>

                <div class="city-img-best-choice">
                    <img src="https://cdn.shopify.com/s/files/1/0685/4115/3567/files/Mask_group_14.png?v=1773406123" alt="">
                </div>
            </div>

            <div class="best-choice-city-card">
                <h3>${h3}</h3>

            <ul class="best-choice-city-features">
                ${liHTML}
            </ul>

            <p>${p2}</p>

            <a href="https://alignerco.com/pages/survey" class="best-choice-city-btn">${cta}</a>
            </div>
            </div>`;

            document.getElementById("output3").value = html;
        }
    </script>

</body>

</html>
